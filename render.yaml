services:
  # Web Service para la aplicación Flask
  - type: web
    name: taskflow-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow_db_xs9b
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  # Base de Datos PostgreSQL administrada
  - name: dpg-d8mb4h0js32c73cf85r0-a
    databaseName: taskflow_db_xs9b
    user: taskflow_db_xs9b_user
    plan: free
