services:
  # Web Service para la aplicación Flask
  - type: web
    name: taskflow-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  # Base de Datos PostgreSQL administrada
  - name: taskflow-db
    databaseName: tareas_db
    user: postgres
    plan: free
